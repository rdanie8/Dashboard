<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloomberg Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#ffffff',
              card: '#ffffff',
              panel: '#f5f5f5',
              border: '#e5e7eb',
              borderLight: '#eeeeee',
              textPrimary: '#111827',
              textMuted: '#6b7280',
              textLight: '#9ca3af',
              gain: '#16a34a',
              loss: '#dc2626',
              orange: '#ff9400',
              blueAccent: '#0077ff',
              headerBg: '#ffffff',
              marketBg: '#f5f5f5',
              tileBg: '#f9fafb'
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --card: #ffffff;
        --panel: #f5f5f5;
        --border: #e5e7eb;
        --border-light: #eeeeee;
        --text-primary: #111827;
        --text-muted: #6b7280;
        --text-light: #9ca3af;
        --gain: #16a34a;
        --loss: #dc2626;
        --orange: #ff9400;
        --blue: #0077ff;
        --header-bg: #ffffff;
        --market-bg: #f5f5f5;
        --tile-bg: #f9fafb;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
      }
      .font-mono-data {
        font-family: 'IBM Plex Mono', monospace;
      }

      /* Header */
      .header-bar {
        height: 40px;
        background: var(--header-bg);
        border-bottom: 2px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
      }
      .header-btn {
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: #374151;
        font-size: 11px;
        font-family: 'IBM Plex Mono', monospace;
        padding: 3px 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .header-btn:hover { background: #e5e7eb; color: #111827; }

      /* Market Section */
      .market-section {
        background: var(--market-bg);
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        position: fixed;
        top: 40px; left: 0; right: 0;
        z-index: 99;
      }
      .market-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0;
      }
      .market-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: #374151;
      }
      .pulse-dot {
        display: inline-block;
        width: 7px; height: 7px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .market-time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
      }

      /* Market Tiles — New CSS */
      #market-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .market-tile {
        display: block;
        text-decoration: none;
        color: inherit;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        padding: 6px 10px;
        min-width: 130px;
        flex: 1 1 130px;
        max-width: 160px;
        position: relative;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .market-tile:hover {
        background: #e8f0fe;
        border-color: #93c5fd;
      }
      .tile-link-icon {
        position: absolute;
        top: 4px;
        right: 6px;
        font-size: 9px;
        color: #9ca3af;
      }
      .tile-name {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 700;
        color: #374151;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .tile-price {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 2px;
      }
      .tile-change {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 500;
      }
      @media (max-width: 767px) {
        .market-tile { max-width: calc(50% - 3px); }
      }

      /* Quick Links Bar */
      .quick-links-bar {
        height: 34px;
        background: #ffffff;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 14px;
        position: fixed;
        top: 114px;
        left: 0; right: 0;
        z-index: 98;
      }
      .quick-links-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      .quick-link-btn {
        background: #f5f5f5;
        border: 1px solid #d1d5db;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: #374151;
        padding: 3px 12px;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        text-decoration: none;
        display: inline-block;
        white-space: nowrap;
      }
      .quick-link-btn:hover { background: #e5e7eb; color: #111827; }

      /* Columns */
      .columns-container {
        position: fixed;
        top: 148px;
        left: 0; right: 0; bottom: 0;
        display: flex;
      }
      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        min-width: 0;
        overflow: hidden;
      }
      .column:last-child { border-right: none; }
      .col-header {
        background: var(--panel);
        border-top: 3px solid var(--orange);
        padding: 7px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .col-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .col-meta {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .col-meta:hover { color: var(--text-muted); }

      /* 36h filter pill badge */
      .filter-pill {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        color: var(--orange);
        border: 1px solid var(--orange);
        background: transparent;
        padding: 1px 5px;
        line-height: 1.2;
        display: inline-block;
        margin-left: 4px;
      }

      /* Article list */
      .article-list {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: #d1d5db #f9fafb;
      }
      .article-list::-webkit-scrollbar { width: 4px; }
      .article-list::-webkit-scrollbar-track { background: #f9fafb; }
      .article-list::-webkit-scrollbar-thumb { background: #d1d5db; }

      .article-card {
        background: var(--card);
        border-bottom: 1px solid var(--border-light);
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.15s;
        display: block;
        text-decoration: none;
      }
      .article-card:hover { background: #f9fafb; }
      .article-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .source-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        padding: 1px 5px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-radius: 0;
      }
      .time-ago {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .recent-dot {
        width: 5px; height: 5px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
        display: inline-block;
      }
      .article-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 2px;
      }
      .article-desc {
        font-size: 11px;
        color: var(--text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.3;
      }

      /* Skeleton */
      .skeleton-card { padding: 10px; border-bottom: 1px solid var(--border-light); }
      .skeleton-line {
        height: 10px;
        background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        margin-bottom: 6px;
        border-radius: 2px;
      }
      .skeleton-line.short { width: 40%; }
      .skeleton-line.medium { width: 75%; }
      .skeleton-line.long { width: 95%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Feed error */
      .feed-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        text-align: center;
        gap: 8px;
      }
      .retry-btn {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        color: var(--orange);
        padding: 4px 12px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover { background: #e5e7eb; }

      /* Settings Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.show { display: flex; }
      .modal-panel {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        max-width: 400px;
        width: 90%;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
      .modal-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }
      .modal-field { margin-bottom: 12px; }
      .modal-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 4px;
        display: block;
        letter-spacing: 0.3px;
      }
      .modal-input {
        width: 100%;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: var(--text-primary);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        border-radius: 3px;
      }
      .modal-input:focus { border-color: var(--orange); }
      .modal-select {
        width: 100%;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: var(--text-primary);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        border-radius: 3px;
      }
      .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
      .btn-save {
        background: var(--orange);
        color: #fff;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        padding: 6px 16px;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-save:hover { background: #e88600; }
      .btn-cancel {
        background: #f3f4f6;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 6px 16px;
        border: 1px solid #d1d5db;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-cancel:hover { background: #e5e7eb; }

      /* Mobile responsive */
      @media (max-width: 767px) {
        .header-clock { display: none !important; }
        .columns-container {
          flex-direction: column;
          overflow-y: auto;
        }
        .column {
          flex: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .column.collapsed .article-list { display: none; }
        .col-header { cursor: pointer; }
        .col-header .collapse-icon { display: inline-block; }
        .article-list { max-height: 400px; }
      }
      @media (min-width: 768px) {
        .col-header .collapse-icon { display: none; }
      }
    </style>
  </head>

          { name: 'BMJ OPEN', url: 'https://bmjopen.bmj.com/rss/current.xml' },
          { name: 'JWATCH GM', url: 'https://www.jwatch.org/general-medicine/rss' },
          { name: 'EMRAP', url: 'https://www.youtube.com/feeds/videos.xml?channel_id=UCxwzhuYyeejWW1MIwIXi1Iw' },
          { name: 'EMCRIT', url: 'https://feeds.feedburner.com/emcrit' },
          { name: 'JAMA', url: 'https://jama.jamanetwork.com/rss/site_3/onlineFirst_67.xml' },
          { name: 'NEJM EM', url: 'https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=emergency-medicine' },
          { name: 'NEJM NEURO', url: 'https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=neurology-neurosurgery' },
          { name: 'JWATCH EM', url: 'https://www.jwatch.org/emergency-medicine/rss' }
        ]
      }
    ];

    // ── STATE ──
    const columnState = {};
    COLUMNS.forEach(col => {
      columnState[col.id] = { mergedArticles: [], lastFetch: 0, collapsed: false };
    });

    // ── UTILITIES ──
    function stripHTML(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.innerHTML = str;
      return d.textContent?.trim() || '';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return '';
      const now = Date.now();
      const diff = now - date.getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (mins < 0) return 'just now'; // future date guard
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      // For older articles, show actual date
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: days > 365 ? 'numeric' : undefined });
    }

    function isRecent(dateStr) {
      if (!dateStr) return false;
      const delta = Date.now() - new Date(dateStr).getTime();
      return delta < 2 * 60 * 60 * 1000;
    }

    function nowTimestamp() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function filterByAge(articles) {
      const now = Date.now();
      return articles.filter(article => {
        if (!article.pubDate) return true;
        const parsed = new Date(article.pubDate).getTime();
        if (isNaN(parsed)) return true;
        return (now - parsed) <= FILTER_AGE_MS;
      });
    }

    // ── CLOCK ──
    function updateClock() {
      const now = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const d = days[now.getDay()];
      const day = String(now.getDate()).padStart(2,'0');
      const mon = months[now.getMonth()];
      const yr = now.getFullYear();
      const time = now.toLocaleTimeString('en-US', { hour12: false });
      const el = document.getElementById('header-clock-c3d4');
      if (el) el.textContent = `${d} ${day} ${mon} ${yr}  ${time} CDT`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── MARKET DATA (multi-proxy fallback) ──
    async function fetchMarketData() {
      const syms = MARKET_SYMBOLS.map(s => s.sym).join(',');
      const apiUrl = `https://query1.finance.yahoo.com/v8/finance/quote?symbols=${encodeURIComponent(syms)}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent`;

      const attempts = [
        () => fetch(`https://corsproxy.io/?url=${encodeURIComponent(apiUrl)}`, { cache: 'no-store' }),
        () => fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`, { cache: 'no-store' }),
        () => fetch(`https://thingproxy.freeboard.io/fetch/${apiUrl}`, { cache: 'no-store' })
      ];

      for (const attempt of attempts) {
        try {
          const res = await attempt();
          if (!res.ok) continue;
          let json;
          const text = await res.text();
          // allorigins wraps response in { contents: "..." }
          try {
            const outer = JSON.parse(text);
            json = outer.contents ? JSON.parse(outer.contents) : outer;
          } catch { continue; }
          const quotes = json?.quoteResponse?.result || [];
          if (quotes.length === 0) continue;
          renderMarketTiles(quotes);
          updateMarketTimestamp();
          return; // success — stop trying
        } catch (e) {
          continue;
        }
      }
      // All proxies failed — show fallback
      renderMarketFallback();
    }

    function renderMarketTiles(quotes) {
      const container = document.getElementById('market-tiles');
      if (!container) return;
      container.innerHTML = '';
      MARKET_SYMBOLS.forEach(sym => {
        const q = quotes.find(r => r.symbol === sym.sym);
        const price = q ? q.regularMarketPrice : null;
        const change = q ? q.regularMarketChange : null;
        const pct = q ? q.regularMarketChangePercent : null;
        const isGain = change >= 0;
        const color = isGain ? '#16a34a' : '#dc2626';
        const arrow = isGain ? '▲' : '▼';
        const priceStr = price != null ? price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '—';
        const changeStr = change != null ? (isGain ? '+' : '') + change.toFixed(2) : '—';
        const pctStr = pct != null ? (isGain ? '+' : '') + pct.toFixed(2) + '%' : '—';

        const tile = document.createElement('a');
        tile.href = sym.url;
        tile.target = '_blank';
        tile.rel = 'noopener noreferrer';
        tile.className = 'market-tile';
        tile.innerHTML = `
          <div class="tile-link-icon">↗</div>
          <div class="tile-name">${sym.name}</div>
          <div class="tile-price">${priceStr}</div>
          <div class="tile-change" style="color:${color}">${arrow} ${changeStr} (${pctStr})</div>
        `;
        container.appendChild(tile);
      });
    }

    function renderMarketFallback() {
      const container = document.getElementById('market-tiles');
      if (!container) return;
      container.innerHTML = '<div style="font-size:11px;color:#6b7280;padding:8px;">Market data unavailable — retrying…</div>';
    }

    function updateMarketTimestamp() {
      const el = document.getElementById('market-updated');
      if (el) {
        const now = new Date();
        el.textContent = 'Updated ' + now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
      }
    }

    // ── RSS FEEDS — Direct XML fetch with multi-proxy fallback ──

    function parseXMLItems(xmlText, sourceName) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'text/xml');

      const rssItems = [...xml.querySelectorAll('item')];
      if (rssItems.length > 0) {
        return rssItems.map(item => {
          const pubDate = item.querySelector('pubDate')?.textContent?.trim() ||
                          item.querySelector('published')?.textContent?.trim() ||
                          item.querySelector('updated')?.textContent?.trim() ||
                          item.querySelector('dc\\:date, date')?.textContent?.trim() ||
                          '';
          return {
            title: item.querySelector('title')?.textContent || '',
            link: item.querySelector('link')?.textContent || '',
            pubDate: pubDate,
            description: item.querySelector('description')?.textContent || '',
            source: sourceName
          };
        });
      }

      const atomEntries = [...xml.querySelectorAll('entry')];
      if (atomEntries.length > 0) {
        return atomEntries.map(entry => {
          const title = entry.querySelector('title')?.textContent || '';
          let link = '';
          const altLink = entry.querySelector('link[rel="alternate"]');
          if (altLink) {
            link = altLink.getAttribute('href') || '';
          } else {
            const anyLink = entry.querySelector('link');
            if (anyLink) {
              link = anyLink.getAttribute('href') || anyLink.textContent || '';
            }
          }
          if (!link) {
            link = entry.querySelector('id')?.textContent || '';
          }
          const pubDate = entry.querySelector('published')?.textContent?.trim() ||
                          entry.querySelector('updated')?.textContent?.trim() ||
                          entry.querySelector('pubDate')?.textContent?.trim() ||
                          '';
          const mediaDesc = entry.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'description');
          let description = '';
          if (mediaDesc.length > 0) {
            description = mediaDesc[0].textContent || '';
          } else {
            description = entry.querySelector('content')?.textContent ||
                          entry.querySelector('summary')?.textContent || '';
          }
          return { title, link, pubDate, description, source: sourceName };
        });
      }

      return [];
    }

    async function fetchSingleFeed(feedUrl, sourceName) {
      const bust = '&_cb=' + Date.now(); // cache-buster
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(feedUrl + (feedUrl.includes('?') ? '&' : '?') + '_cb=' + Date.now())}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}${bust}`
      ];

      for (const proxyUrl of proxies) {
        try {
          const res = await fetch(proxyUrl, { cache: 'no-store' });
          if (!res.ok) continue;
          const text = await res.text();
          // allorigins wraps in { contents: "..." }
          let xmlText = text;
          try {
            const outer = JSON.parse(text);
            if (outer.contents) xmlText = outer.contents;
          } catch { /* raw XML, use as-is */ }

          const items = parseXMLItems(xmlText, sourceName);
          if (items.length > 0) {
            console.log(`✓ ${sourceName}: ${items.length} items via ${proxyUrl.includes('allorigins') ? 'allorigins' : 'corsproxy'}`);
            return items;
          }
        } catch (e) {
          console.warn(`Proxy failed for ${sourceName}:`, e.message);
        }
      }
      console.warn(`All proxies failed for ${sourceName}`);
      return [];
    }

    // ── RENDERING ──
    function skeletonHTML() {
      let h = '';
      for (let i = 0; i < 4; i++) {
        h += `<div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>`;
      }
      return h;
    }

    function articleListHTML(articles, maxItems, emptyMessage) {
      if (!articles || articles.length === 0) {
        const msg = emptyMessage || 'No articles found';
        return `<div class="feed-error"><span>${msg}</span></div>`;
      }
      let h = '';
      articles.slice(0, maxItems || 40).forEach(item => {
        const title = stripHTML(item.title);
        const desc = stripHTML(item.description);
        const ago = timeAgo(item.pubDate);
        const recent = isRecent(item.pubDate);
        const color = BADGE_COLORS[item.source] || '#6b7280';
        h += `<a class="article-card" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <div class="article-top">
            <span class="source-badge" style="background:${color}">${item.source}</span>
            <span class="time-ago">${recent ? '<span class="recent-dot"></span>' : ''}${ago}</span>
          </div>
          <div class="article-title">${title}</div>
          ${desc ? `<div class="article-desc">${desc}</div>` : ''}
        </a>`;
      });
      return h;
    }

    function sortByDate(articles) {
      return articles.sort((a, b) => {
        const da = new Date(a.pubDate).getTime() || 0;
        const db = new Date(b.pubDate).getTime() || 0;
        return db - da;
      });
    }

    async function fetchAllFeedsForColumn(colId) {
      const col = COLUMNS.find(c => c.id === colId);
      if (!col) return;
      const listEl = document.getElementById(`articles-${colId}`);
      if (!listEl) return;

      listEl.innerHTML = skeletonHTML();
      let merged = [];

      const promises = col.feeds.map(feed => fetchSingleFeed(feed.url, feed.name));
      const results = await Promise.allSettled(promises);

      results.forEach(result => {
        if (result.status === 'fulfilled' && result.value.length > 0) {
          merged = merged.concat(result.value);
        }
      });

      merged = sortByDate(merged);

      if (FILTERED_COLUMNS.has(colId)) {
        merged = filterByAge(merged);
      }

      columnState[colId].mergedArticles = merged;
      columnState[colId].lastFetch = Date.now();

      const emptyMsg = FILTERED_COLUMNS.has(colId) ? 'No articles in the past 36 hours' : 'No articles found';
      listEl.innerHTML = articleListHTML(merged, 40, emptyMsg);
      updateColTimestamp(colId);
    }

    function updateColTimestamp(colId) {
      const el = document.getElementById(`col-time-${colId}`);
      if (el) el.textContent = nowTimestamp();
    }

    // ── LAYOUT CALCULATION ──
    function calculateLayout() {
      const marketSection = document.getElementById('market-section-w2x3');
      const quickLinksBar = document.getElementById('quick-links-bar-q1r2');
      const cols = document.getElementById('columns-container-c4d5');

      const headerH = 40;
      const marketH = (marketSection && marketSection.offsetHeight > 20) ? marketSection.offsetHeight : 74;
      const quickLinksH = quickLinksBar ? quickLinksBar.offsetHeight : 34;

      if (quickLinksBar) {
        quickLinksBar.style.top = (headerH + marketH) + 'px';
      }

      cols.style.top = (headerH + marketH + quickLinksH) + 'px';
    }

    // ── RENDER COLUMNS ──
    function renderColumns() {
      const container = document.getElementById('columns-container-c4d5');
      container.innerHTML = '';
      COLUMNS.forEach(col => {
        const div = document.createElement('div');
        div.className = 'column';
        div.id = `column-${col.id}`;

        const showFilterPill = FILTERED_COLUMNS.has(col.id);

        div.innerHTML = `
          <div class="col-header" data-collapse="${col.id}">
            <div class="flex items-center gap-2">
              <span class="col-title">${col.label}</span>
              <span class="collapse-icon font-mono-data" style="font-size:9px;color:#9ca3af;">▼</span>
            </div>
            <div class="col-meta" data-refresh-col="${col.id}">
              <span>↺</span>
              <span id="col-time-${col.id}" style="font-variant-numeric:tabular-nums;">${nowTimestamp()}</span>
              ${showFilterPill ? '<span class="filter-pill">36h</span>' : ''}
            </div>
          </div>
          <div class="article-list" id="articles-${col.id}">${skeletonHTML()}</div>
        `;
        container.appendChild(div);
      });

      document.querySelectorAll('[data-collapse]').forEach(el => {
        el.addEventListener('click', function(e) {
          if (window.innerWidth >= 768) return;
          if (e.target.closest('[data-refresh-col]')) return;
          const colId = this.dataset.collapse;
          const colEl = document.getElementById(`column-${colId}`);
          if (colEl) {
            colEl.classList.toggle('collapsed');
            const icon = this.querySelector('.collapse-icon');
            if (icon) icon.textContent = colEl.classList.contains('collapsed') ? '▶' : '▼';
          }
        });
      });

      document.querySelectorAll('[data-refresh-col]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          fetchAllFeedsForColumn(this.dataset.refreshCol);
        });
      });
    }

    // ── SETTINGS ──
    function openSettings() {
      document.getElementById('select-rss-i6j7').value = localStorage.getItem('rssInterval') || '15';
      document.getElementById('select-mkt-q4r5').value = localStorage.getItem('mktInterval') || '2';
      document.getElementById('settings-modal-g8h9').classList.add('show');
    }

    function closeSettings() {
      document.getElementById('settings-modal-g8h9').classList.remove('show');
    }

    function saveSettings() {
      localStorage.setItem('rssInterval', document.getElementById('select-rss-i6j7').value);
      localStorage.setItem('mktInterval', document.getElementById('select-mkt-q4r5').value);
      closeSettings();
      startRefreshTimers();
    }

    function refreshAll() {
      fetchMarketData();
      COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));
    }

    // ── REFRESH TIMERS ──
    let rssTimer;
    function startRefreshTimers() {
      if (rssTimer) clearInterval(rssTimer);
      rssTimer = setInterval(() => {
        COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));
      }, CONFIG.rssRefresh);
    }

    // ── INIT ──
    function init() {
      if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
        lucide.createIcons();
      }

      document.getElementById('settings-btn-e5f6').addEventListener('click', openSettings);
      document.getElementById('refresh-btn-g7h8').addEventListener('click', refreshAll);
      document.getElementById('save-settings-y2z3').addEventListener('click', saveSettings);
      document.getElementById('cancel-settings-c6d7').addEventListener('click', closeSettings);
      document.getElementById('settings-modal-g8h9').addEventListener('click', function(e) {
        if (e.target === this) closeSettings();
      });

      renderColumns();

      // Market data: immediate first load + single interval
      fetchMarketData();
      const MARKET_INTERVAL = setInterval(fetchMarketData, 2 * 60 * 1000);

      COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));

      requestAnimationFrame(() => {
        calculateLayout();
        window.addEventListener('resize', calculateLayout);
      });

      // Start RSS refresh timers (market interval is handled above — only one)
      startRefreshTimers();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    </script>
  </body>
