<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloomberg Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#ffffff',
              card: '#ffffff',
              panel: '#f5f5f5',
              border: '#e5e7eb',
              borderLight: '#eeeeee',
              textPrimary: '#111827',
              textMuted: '#6b7280',
              textLight: '#9ca3af',
              gain: '#16a34a',
              loss: '#dc2626',
              orange: '#ff9400',
              blueAccent: '#0077ff',
              headerBg: '#ffffff',
              marketBg: '#f5f5f5',
              tileBg: '#f9fafb'
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --card: #ffffff;
        --panel: #f5f5f5;
        --border: #e5e7eb;
        --border-light: #eeeeee;
        --text-primary: #111827;
        --text-muted: #6b7280;
        --text-light: #9ca3af;
        --gain: #16a34a;
        --loss: #dc2626;
        --orange: #ff9400;
        --blue: #0077ff;
        --header-bg: #ffffff;
        --market-bg: #f5f5f5;
        --tile-bg: #f9fafb;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
      }
      .font-mono-data {
        font-family: 'IBM Plex Mono', monospace;
      }

      /* Header */
      .header-bar {
        height: 40px;
        background: var(--header-bg);
        border-bottom: 2px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
      }
      .header-btn {
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: #374151;
        font-size: 11px;
        font-family: 'IBM Plex Mono', monospace;
        padding: 3px 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .header-btn:hover { background: #e5e7eb; color: #111827; }

      /* Market Section */
      .market-section {
        background: var(--market-bg);
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        position: fixed;
        top: 40px; left: 0; right: 0;
        z-index: 99;
      }
      .market-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .market-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: #374151;
      }
      .pulse-dot {
        display: inline-block;
        width: 7px; height: 7px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .market-time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
      }
      .market-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }
      .market-tile {
        background: var(--tile-bg);
        border: 1px solid var(--border);
        padding: 6px 10px;
        min-height: 56px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .tile-name {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        color: #374151;
        text-transform: uppercase;
        line-height: 1;
        margin-bottom: 2px;
      }
      .tile-price {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.2;
      }
      .tile-change {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        line-height: 1.2;
      }
      .tile-up { color: var(--gain); }
      .tile-down { color: var(--loss); }

      /* Columns */
      .columns-container {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        display: flex;
      }
      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        min-width: 0;
        overflow: hidden;
      }
      .column:last-child { border-right: none; }
      .col-header {
        background: var(--panel);
        border-top: 3px solid var(--orange);
        padding: 7px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .col-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .col-meta {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .col-meta:hover { color: var(--text-muted); }

      /* 36h filter pill badge */
      .filter-pill {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        color: var(--orange);
        border: 1px solid var(--orange);
        background: transparent;
        padding: 1px 5px;
        line-height: 1.2;
        display: inline-block;
        margin-left: 4px;
      }

      /* Article list */
      .article-list {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: #d1d5db #f9fafb;
      }
      .article-list::-webkit-scrollbar { width: 4px; }
      .article-list::-webkit-scrollbar-track { background: #f9fafb; }
      .article-list::-webkit-scrollbar-thumb { background: #d1d5db; }

      .article-card {
        background: var(--card);
        border-bottom: 1px solid var(--border-light);
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.15s;
        display: block;
        text-decoration: none;
      }
      .article-card:hover { background: #f9fafb; }
      .article-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .source-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        padding: 1px 5px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-radius: 0;
      }
      .time-ago {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .recent-dot {
        width: 5px; height: 5px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
        display: inline-block;
      }
      .article-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 2px;
      }
      .article-desc {
        font-size: 11px;
        color: var(--text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.3;
      }

      /* Skeleton */
      .skeleton-card { padding: 10px; border-bottom: 1px solid var(--border-light); }
      .skeleton-line {
        height: 10px;
        background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        margin-bottom: 6px;
        border-radius: 2px;
      }
      .skeleton-line.short { width: 40%; }
      .skeleton-line.medium { width: 75%; }
      .skeleton-line.long { width: 95%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Feed error */
      .feed-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        text-align: center;
        gap: 8px;
      }
      .retry-btn {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        color: var(--orange);
        padding: 4px 12px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover { background: #e5e7eb; }

      /* Settings Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.show { display: flex; }
      .modal-panel {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        max-width: 400px;
        width: 90%;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
      .modal-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }
      .modal-field { margin-bottom: 12px; }
      .modal-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 4px;
        display: block;
        letter-spacing: 0.3px;
      }
      .modal-input {
        width: 100%;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: var(--text-primary);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        border-radius: 3px;
      }
      .modal-input:focus { border-color: var(--orange); }
      .modal-select {
        width: 100%;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: var(--text-primary);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        border-radius: 3px;
      }
      .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
      .btn-save {
        background: var(--orange);
        color: #fff;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        padding: 6px 16px;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-save:hover { background: #e88600; }
      .btn-cancel {
        background: #f3f4f6;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 6px 16px;
        border: 1px solid #d1d5db;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-cancel:hover { background: #e5e7eb; }

      /* Version label */
      .version-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: #c0c4cc;
        margin-left: 10px;
        white-space: nowrap;
        user-select: none;
      }

      /* Mobile responsive */
      @media (max-width: 767px) {
        .header-clock { display: none !important; }
        .market-grid { grid-template-columns: repeat(2, 1fr); }
        .columns-container {
          flex-direction: column;
          overflow-y: auto;
        }
        .column {
          flex: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .column.collapsed .article-list { display: none; }
        .col-header { cursor: pointer; }
        .col-header .collapse-icon { display: inline-block; }
        .article-list { max-height: 400px; }
        .version-label { display: none; }
      }
      @media (min-width: 768px) {
        .col-header .collapse-icon { display: none; }
      }
    </style>
  </head>

    <script>
    /* =========================================================
       BLOOMBERG ULTRA DASHBOARD — Light Theme, Merged Feeds
       ========================================================= */

    // ── CONFIG ──
    const CONFIG = {
      symbols: ['^DJI','^GSPC','^IXIC','^RUT','^TNX','BTC-USD','ETH-USD','GC=F','CL=F','EURUSD=X'],
      nameMap: {
        '^DJI':'DOW', '^GSPC':'S&P 500', '^IXIC':'NASDAQ', '^RUT':'RUSSELL 2K',
        '^TNX':'10Y YIELD', 'BTC-USD':'BITCOIN', 'ETH-USD':'ETHEREUM',
        'GC=F':'GOLD', 'CL=F':'CRUDE OIL', 'EURUSD=X':'EUR/USD'
      },
      corsProxy: 'https://corsproxy.io/?url=',
      get mktRefresh() { return (parseInt(localStorage.getItem('mktInterval')) || 2) * 60 * 1000; },
      get rssRefresh() { return (parseInt(localStorage.getItem('rssInterval')) || 15) * 60 * 1000; }
    };

    // Columns that should have the 36-hour age filter applied
    const FILTERED_COLUMNS = new Set(['news', 'markets']);
    const FILTER_AGE_MS = 36 * 60 * 60 * 1000; // 36 hours in milliseconds

    const BADGE_COLORS = {
      'AP':'#dc2626',
      'WAPO':'#1a1a1a',
      'NYT':'#1a1a1a',
      'WSJ':'#004b87',
      'BBC':'#bb1919',
      'TIME':'#c8102e',
      'Y!FIN':'#6001d2',
      'MKTWTCH':'#00a651',
      'arXiv IR':'#b45309',
      'arXiv CR':'#b45309',
      'arXiv LG':'#b45309',
      'arXiv ML':'#b45309',
      'arXiv CV':'#b45309',
      'arXiv AI':'#b45309',
      'MIT AI':'#d72638',
      'MIT NEWS':'#d72638',
      'BMJ OPEN':'#005eb8',
      'JWATCH GM':'#003087',
      'EMRAP':'#cc0000',
      'EMCRIT':'#e53e3e',
      'JAMA':'#c41230',
      'NEJM EM':'#003087',
      'NEJM NEURO':'#003087',
      'JWATCH EM':'#003087',
      'ECG WKY':'#b7410e'
    };

    const COLUMNS = [
      {
        id: 'news', label: 'NEWS (24h)',
        feeds: [
          { name: 'AP', url: 'https://feedx.net/rss/ap.xml' },
          { name: 'WAPO', url: 'https://feeds.washingtonpost.com/rss/world' },
          { name: 'NYT', url: 'https://www.nytimes.com/services/xml/rss/nyt/HomePage.xml' },
          { name: 'WSJ', url: 'https://feeds.content.dowjones.io/public/rss/RSSWorldNews' },
          { name: 'BBC', url: 'https://feeds.bbci.co.uk/news/rss.xml' },
          { name: 'TIME', url: 'https://time.com/feed/' }
        ]
      },
      {
        id: 'markets', label: 'MARKETS (TODAY)',
        feeds: [
          { name: 'Y!FIN', url: 'https://finance.yahoo.com/rss/techticker' },
          { name: 'MKTWTCH', url: 'https://feeds.marketwatch.com/marketwatch/marketpulse/' },
          { name: 'WSJ', url: 'https://feeds.a.dj.com/rss/RSSMarketsMain.xml' }
        ]
      },
      {
        id: 'ai', label: 'AI LEARNING',
        feeds: [
          { name: 'arXiv IR', url: 'https://arxiv.org/rss/cs.IR' },
          { name: 'arXiv CR', url: 'https://arxiv.org/rss/cs.CR' },
          { name: 'arXiv LG', url: 'https://arxiv.org/rss/cs.LG' },
          { name: 'arXiv ML', url: 'https://arxiv.org/rss/stat.ML' },
          { name: 'arXiv CV', url: 'https://arxiv.org/rss/cs.CV' },
          { name: 'arXiv AI', url: 'https://arxiv.org/rss/cs.AI' },
          { name: 'MIT AI', url: 'https://www.technologyreview.com/topic/artificial-intelligence/feed' },
          { name: 'MIT NEWS', url: 'https://www.technologyreview.com/topnews.rss' }
        ]
      },
      {
        id: 'medical', label: 'MEDICAL EDU',
        feeds: [
          { name: 'BMJ OPEN', url: 'https://bmjopen.bmj.com/rss/current.xml' },
          { name: 'JWATCH GM', url: 'https://www.jwatch.org/general-medicine/rss' },
          { name: 'EMRAP', url: 'https://www.youtube.com/feeds/videos.xml?channel_id=UCxwzhuYyeejWW1MIwIXi1Iw' },
          { name: 'EMCRIT', url: 'https://feeds.feedburner.com/emcrit' },
          { name: 'JAMA', url: 'https://jama.jamanetwork.com/rss/site_3/onlineFirst_67.xml' },
          { name: 'NEJM EM', url: 'https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=emergency-medicine' },
          { name: 'NEJM NEURO', url: 'https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=neurology-neurosurgery' },
          { name: 'JWATCH EM', url: 'https://www.jwatch.org/emergency-medicine/rss' },
          { name: 'ECG WKY', url: 'https://ecgweekly.com/feed/' }
        ]
      }
    ];

    // ── STATE ──
    const columnState = {};
    COLUMNS.forEach(col => {
      columnState[col.id] = { mergedArticles: [], lastFetch: 0, collapsed: false };
    });

    // ── UTILITIES ──
    function stripHTML(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.innerHTML = str;
      return d.textContent?.trim() || '';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = Date.now();
      const past = new Date(dateStr).getTime();
      if (isNaN(past)) return '';
      const delta = Math.max(0, now - past);
      const mins = Math.floor(delta / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      return days + 'd ago';
    }

    function isRecent(dateStr) {
      if (!dateStr) return false;
      const delta = Date.now() - new Date(dateStr).getTime();
      return delta < 2 * 60 * 60 * 1000; // 2 hours
    }

    function formatNum(n, decimals) {
      if (n == null || isNaN(n)) return '—';
      return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function nowTimestamp() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    /**
     * Filter articles older than 36 hours. Articles with missing/unparseable
     * pubDate are kept (included by default).
     */
    function filterByAge(articles) {
      const now = Date.now();
      return articles.filter(article => {
        if (!article.pubDate) return true; // keep if no date
        const parsed = new Date(article.pubDate).getTime();
        if (isNaN(parsed)) return true; // keep if unparseable
        return (now - parsed) <= FILTER_AGE_MS;
      });
    }

    // ── CLOCK ──
    function updateClock() {
      const now = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const d = days[now.getDay()];
      const day = String(now.getDate()).padStart(2,'0');
      const mon = months[now.getMonth()];
      const yr = now.getFullYear();
      const time = now.toLocaleTimeString('en-US', { hour12: false });
      const el = document.getElementById('header-clock-c3d4');
      if (el) el.textContent = `${d} ${day} ${mon} ${yr}  ${time} CDT`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── MARKET DATA ──
    const FALLBACK_TICKER = [
      { name:'DOW', price:44821.34, change:182.45, pct:0.41 },
      { name:'S&P 500', price:6154.72, change:23.18, pct:0.38 },
      { name:'NASDAQ', price:20437.85, change:95.62, pct:0.47 },
      { name:'RUSSELL 2K', price:2284.56, change:-8.31, pct:-0.36 },
      { name:'10Y YIELD', price:4.287, change:-0.023, pct:-0.53 },
      { name:'BITCOIN', price:103842.50, change:1247.30, pct:1.22 },
      { name:'ETHEREUM', price:3412.75, change:48.90, pct:1.45 },
      { name:'GOLD', price:2738.40, change:12.60, pct:0.46 },
      { name:'CRUDE OIL', price:73.28, change:-0.94, pct:-1.27 },
      { name:'EUR/USD', price:1.0834, change:0.0012, pct:0.11 }
    ];

    function getDecimals(name) {
      if (name === '10Y YIELD' || name === 'EUR/USD') return 4;
      return 2;
    }

    function renderMarketGrid(items) {
      const grid = document.getElementById('market-grid-m8n9');
      grid.innerHTML = '';
      items.forEach(item => {
        const up = item.change >= 0;
        const cls = up ? 'tile-up' : 'tile-down';
        const arrow = up ? '▲' : '▼';
        const sign = up ? '+' : '';
        const dec = getDecimals(item.name);
        const tile = document.createElement('div');
        tile.className = 'market-tile';
        tile.innerHTML = `
          <div class="tile-name">${item.name}</div>
          <div class="tile-price">${formatNum(item.price, dec)}</div>
          <div class="tile-change ${cls}">${arrow} ${sign}${formatNum(item.change, dec)} (${sign}${formatNum(item.pct, 2)}%)</div>
        `;
        grid.appendChild(tile);
      });
      document.getElementById('market-time-i4j5').textContent = 'Updated ' + nowTimestamp();
    }

    async function fetchMarketData() {
      try {
        const url = CONFIG.corsProxy + encodeURIComponent(
          'https://query1.finance.yahoo.com/v8/finance/quote?symbols=' + CONFIG.symbols.join(',')
        );
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const results = data.quoteResponse?.result || [];
        if (results.length === 0) throw new Error('No results');
        const items = results.map(q => ({
          name: CONFIG.nameMap[q.symbol] || q.shortName || q.symbol,
          price: q.regularMarketPrice,
          change: q.regularMarketChange,
          pct: q.regularMarketChangePercent
        }));
        renderMarketGrid(items);
      } catch (e) {
        console.warn('Market fetch failed, using fallback:', e);
        renderMarketGrid(FALLBACK_TICKER);
      }
    }

    // ── RSS FEEDS — Parallel multi-proxy fetch with client-side XML parsing ──

    /**
     * Fetches an RSS/Atom feed via multiple CORS proxies fired simultaneously
     * using Promise.any(). Each proxy has an 8-second timeout via
     * AbortSignal.timeout(). The first successful response wins.
     * Returns an array of { title, link, pubDate, description }.
     */
    async function fetchFeed(url) {
      // Build one fetch attempt per proxy, all fired at once
      function attempt(proxyUrl) {
        return fetch(proxyUrl, { signal: AbortSignal.timeout(8000) })
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            if (!text || text.trim().length < 50) throw new Error('empty');
            return text;
          });
      }

      const enc = encodeURIComponent(url);
      const races = [
        attempt(`https://corsproxy.io/?url=${enc}`),
        attempt(`https://api.allorigins.win/raw?url=${enc}`),
        attempt(`https://api.codetabs.com/v1/proxy?quest=${enc}`)
      ];

      let xmlText;
      try {
        xmlText = await Promise.any(races);
      } catch (e) {
        return [];
      }

      try {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item, entry'));
        return items.slice(0, 25).map(item => {
          const title = item.querySelector('title')?.textContent?.trim() || 'Untitled';
          let link = '';
          const linkEl = item.querySelector('link');
          if (linkEl) link = linkEl.getAttribute('href') || linkEl.textContent?.trim() || '';
          const pubDate =
            item.querySelector('pubDate')?.textContent?.trim() ||
            item.querySelector('published')?.textContent?.trim() ||
            item.querySelector('updated')?.textContent?.trim() || '';
          const description =
            item.querySelector('description')?.textContent?.trim() ||
            item.querySelector('summary')?.textContent?.trim() ||
            item.querySelector('content')?.textContent?.trim() || '';
          return { title, link, pubDate, description };
        });
      } catch (e) {
        return [];
      }
    }

    // ── RENDERING ──
    function skeletonHTML() {
      let h = '';
      for (let i = 0; i < 4; i++) {
        h += `<div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>`;
      }
      return h;
    }

    function articleListHTML(articles, maxItems, emptyMessage) {
      if (!articles || articles.length === 0) {
        const msg = emptyMessage || 'No articles found';
        return `<div class="feed-error"><span>${msg}</span></div>`;
      }
      let h = '';
      articles.slice(0, maxItems || 40).forEach(item => {
        const title = stripHTML(item.title);
        const desc = stripHTML(item.description);
        const ago = timeAgo(item.pubDate);
        const recent = isRecent(item.pubDate);
        const color = BADGE_COLORS[item.source] || '#6b7280';
        h += `<a class="article-card" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <div class="article-top">
            <span class="source-badge" style="background:${color}">${item.source}</span>
            <span class="time-ago">${recent ? '<span class="recent-dot"></span>' : ''}${ago}</span>
          </div>
          <div class="article-title">${title}</div>
          ${desc ? `<div class="article-desc">${desc}</div>` : ''}
        </a>`;
      });
      return h;
    }

    function sortByDate(articles) {
      return articles.sort((a, b) => {
        const da = new Date(a.pubDate).getTime() || 0;
        const db = new Date(b.pubDate).getTime() || 0;
        return db - da;
      });
    }

    async function fetchAllFeedsForColumn(colId) {
      const col = COLUMNS.find(c => c.id === colId);
      if (!col) return;
      const listEl = document.getElementById(`articles-${colId}`);
      if (!listEl) return;

      listEl.innerHTML = skeletonHTML();
      let merged = [];

      const promises = col.feeds.map(feed =>
        fetchFeed(feed.url).then(items =>
          items.map(item => ({ ...item, source: feed.name }))
        )
      );
      const results = await Promise.allSettled(promises);

      results.forEach(result => {
        if (result.status === 'fulfilled' && result.value.length > 0) {
          merged = merged.concat(result.value);
        }
      });

      merged = sortByDate(merged);

      // Apply 36-hour age filter for News and Markets columns only
      if (FILTERED_COLUMNS.has(colId)) {
        merged = filterByAge(merged);
      }

      columnState[colId].mergedArticles = merged;
      columnState[colId].lastFetch = Date.now();

      const emptyMsg = FILTERED_COLUMNS.has(colId) ? 'No articles in the past 36 hours' : 'No articles found';
      listEl.innerHTML = articleListHTML(merged, 40, emptyMsg);
      updateColTimestamp(colId);
    }

    function updateColTimestamp(colId) {
      const el = document.getElementById(`col-time-${colId}`);
      if (el) el.textContent = nowTimestamp();
    }

    // ── LAYOUT CALCULATION ──
    function calculateLayout() {
      const marketSection = document.getElementById('market-section-w2x3');
      const cols = document.getElementById('columns-container-c4d5');

      const headerH = 40;
      const marketH = marketSection ? marketSection.offsetHeight : 0;

      cols.style.top = (headerH + marketH) + 'px';
    }

    // ── RENDER COLUMNS ──
    function renderColumns() {
      const container = document.getElementById('columns-container-c4d5');
      container.innerHTML = '';
      COLUMNS.forEach(col => {
        const div = document.createElement('div');
        div.className = 'column';
        div.id = `column-${col.id}`;

        const showFilterPill = FILTERED_COLUMNS.has(col.id);

        div.innerHTML = `
          <div class="col-header" data-collapse="${col.id}">
            <div class="flex items-center gap-2">
              <span class="col-title">${col.label}</span>
              <span class="collapse-icon font-mono-data" style="font-size:9px;color:#9ca3af;">▼</span>
            </div>
            <div class="col-meta" data-refresh-col="${col.id}">
              <span>↺</span>
              <span id="col-time-${col.id}" style="font-variant-numeric:tabular-nums;">${nowTimestamp()}</span>
              ${showFilterPill ? '<span class="filter-pill">36h</span>' : ''}
            </div>
          </div>
          <div class="article-list" id="articles-${col.id}">${skeletonHTML()}</div>
        `;
        container.appendChild(div);
      });

      // Collapse (mobile)
      document.querySelectorAll('[data-collapse]').forEach(el => {
        el.addEventListener('click', function(e) {
          if (window.innerWidth >= 768) return;
          if (e.target.closest('[data-refresh-col]')) return;
          const colId = this.dataset.collapse;
          const colEl = document.getElementById(`column-${colId}`);
          if (colEl) {
            colEl.classList.toggle('collapsed');
            const icon = this.querySelector('.collapse-icon');
            if (icon) icon.textContent = colEl.classList.contains('collapsed') ? '▶' : '▼';
          }
        });
      });

      // Refresh per-column
      document.querySelectorAll('[data-refresh-col]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          fetchAllFeedsForColumn(this.dataset.refreshCol);
        });
      });
    }

    // ── SETTINGS ──
    function openSettings() {
      document.getElementById('select-rss-i6j7').value = localStorage.getItem('rssInterval') || '15';
      document.getElementById('select-mkt-q4r5').value = localStorage.getItem('mktInterval') || '2';
      document.getElementById('settings-modal-g8h9').classList.add('show');
    }

    function closeSettings() {
      document.getElementById('settings-modal-g8h9').classList.remove('show');
    }

    function saveSettings() {
      localStorage.setItem('rssInterval', document.getElementById('select-rss-i6j7').value);
      localStorage.setItem('mktInterval', document.getElementById('select-mkt-q4r5').value);
      closeSettings();
      startRefreshTimers();
    }

    function refreshAll() {
      fetchMarketData();
      COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));
    }

    // ── REFRESH TIMERS ──
    let mktTimer, rssTimer;
    function startRefreshTimers() {
      if (mktTimer) clearInterval(mktTimer);
      if (rssTimer) clearInterval(rssTimer);
      mktTimer = setInterval(fetchMarketData, CONFIG.mktRefresh);
      rssTimer = setInterval(() => {
        COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));
      }, CONFIG.rssRefresh);
    }

    // ── INIT ──
    function init() {
      if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
        lucide.createIcons();
      }

      document.getElementById('settings-btn-e5f6').addEventListener('click', openSettings);
      document.getElementById('refresh-btn-g7h8').addEventListener('click', refreshAll);
      document.getElementById('save-settings-y2z3').addEventListener('click', saveSettings);
      document.getElementById('cancel-settings-c6d7').addEventListener('click', closeSettings);
      document.getElementById('settings-modal-g8h9').addEventListener('click', function(e) {
        if (e.target === this) closeSettings();
      });

      renderColumns();
      renderMarketGrid(FALLBACK_TICKER);
      fetchMarketData();

      COLUMNS.forEach(col => fetchAllFeedsForColumn(col.id));

      // Calculate layout after market grid renders
      requestAnimationFrame(() => {
        calculateLayout();
        window.addEventListener('resize', calculateLayout);
      });

      startRefreshTimers();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    </script>
  </body>
