<!DOCTYPE html>
<!-- Bloomberg Ultra Dashboard v3.0 -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloomberg Ultra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#ffffff',
              card: '#ffffff',
              panel: '#f5f5f5',
              border: '#e5e7eb',
              borderLight: '#eeeeee',
              textPrimary: '#111827',
              textMuted: '#6b7280',
              textLight: '#9ca3af',
              gain: '#16a34a',
              loss: '#dc2626',
              orange: '#ff9400',
              blueAccent: '#0077ff',
              headerBg: '#ffffff',
              marketBg: '#f5f5f5',
              tileBg: '#f9fafb'
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --card: #ffffff;
        --panel: #f5f5f5;
        --border: #e5e7eb;
        --border-light: #eeeeee;
        --text-primary: #111827;
        --text-muted: #6b7280;
        --text-light: #9ca3af;
        --gain: #16a34a;
        --loss: #dc2626;
        --orange: #ff9400;
        --blue: #0077ff;
        --header-bg: #ffffff;
        --market-bg: #f5f5f5;
        --tile-bg: #f9fafb;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
      }
      .font-mono-data { font-family: 'IBM Plex Mono', monospace; }

      .header-bar {
        height: 40px;
        background: var(--header-bg);
        border-bottom: 2px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
      }
      .header-btn {
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: #374151;
        font-size: 11px;
        font-family: 'IBM Plex Mono', monospace;
        padding: 3px 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .header-btn:hover { background: #e5e7eb; color: #111827; }

      .market-section {
        background: var(--market-bg);
        padding: 8px 12px;
        border-bottom: 1px solid #e0e0e0;
        position: fixed;
        top: 40px; left: 0; right: 0;
        z-index: 99;
      }
      .market-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .market-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: #374151;
      }
      .pulse-dot {
        display: inline-block;
        width: 7px; height: 7px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .market-time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
      }
      #market-tiles {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 6px;
        margin-top: 6px;
        align-items: stretch;
        grid-auto-rows: 84px;
      }
      .market-tile {
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        padding: 6px 10px;
        min-width: 0;
        height: 100%;
        position: relative;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .market-tile:hover {
        background: #e8f0fe;
        border-color: #93c5fd;
      }
      .tile-link-icon {
        position: absolute;
        top: 4px;
        right: 6px;
        font-size: 9px;
        color: #9ca3af;
      }
      .tile-name {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 700;
        color: #374151;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .tile-price {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 2px;
      }
      .tile-change {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 500;
      }

      .quick-links-bar {
        height: 34px;
        background: #ffffff;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 14px;
        position: fixed;
        left: 0; right: 0;
        z-index: 98;
      }
      .quick-links-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      .quick-link-btn {
        background: #f5f5f5;
        border: 1px solid #d1d5db;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: #374151;
        padding: 3px 12px;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        text-decoration: none;
        display: inline-block;
        white-space: nowrap;
      }
      .quick-link-btn:hover { background: #e5e7eb; color: #111827; }

      .columns-container {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        display: flex;
      }
      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      .column:last-child { border-right: none; }
      .col-header {
        background: var(--panel);
        border-top: 3px solid var(--orange);
        padding: 7px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .col-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .col-meta {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .col-meta:hover { color: var(--text-muted); }
      .filter-pill {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        color: var(--orange);
        border: 1px solid var(--orange);
        background: transparent;
        padding: 1px 5px;
        line-height: 1.2;
        display: inline-block;
        margin-left: 4px;
      }
      .feed-health {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.2px;
        white-space: nowrap;
      }
      .feed-health.ok { color: #6b7280; }
      .feed-health.warn { color: #b45309; }
      .feed-health.error { color: #dc2626; }

      .article-list {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: #d1d5db #f9fafb;
        contain: content;
      }
      .article-list::-webkit-scrollbar { width: 4px; }
      .article-list::-webkit-scrollbar-track { background: #f9fafb; }
      .article-list::-webkit-scrollbar-thumb { background: #d1d5db; }
      .article-card {
        background: var(--card);
        border-bottom: 1px solid var(--border-light);
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.15s;
        display: block;
        text-decoration: none;
        content-visibility: auto;
        contain-intrinsic-size: 82px;
      }
      .article-card:hover { background: #f9fafb; }
      .article-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .source-badge {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        padding: 1px 5px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-radius: 0;
      }
      .time-ago {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .recent-dot {
        width: 5px;
        height: 5px;
        background: var(--orange);
        border-radius: 50%;
        animation: pulse 1s infinite;
        display: inline-block;
      }
      .article-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 2px;
      }
      .article-desc {
        font-size: 11px;
        color: var(--text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.3;
      }

      .skeleton-card { padding: 10px; border-bottom: 1px solid var(--border-light); }
      .skeleton-line {
        height: 10px;
        background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        margin-bottom: 6px;
        border-radius: 2px;
      }
      .skeleton-line.short { width: 40%; }
      .skeleton-line.medium { width: 75%; }
      .skeleton-line.long { width: 95%; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .feed-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        text-align: center;
        gap: 8px;
      }
      .retry-btn {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        color: var(--orange);
        padding: 4px 12px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover { background: #e5e7eb; }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.show { display: flex; }
      .modal-panel {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        max-width: 400px;
        width: 90%;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
      .modal-title {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }
      .modal-field { margin-bottom: 12px; }
      .modal-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 4px;
        display: block;
        letter-spacing: 0.3px;
      }
      .modal-input,
      .modal-select {
        width: 100%;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        color: var(--text-primary);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        border-radius: 3px;
      }
      .modal-input:focus,
      .modal-select:focus { border-color: var(--orange); }
      .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
      .btn-save {
        background: var(--orange);
        color: #fff;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        padding: 6px 16px;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-save:hover { background: #e88600; }
      .btn-cancel {
        background: #f3f4f6;
        color: var(--text-muted);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 6px 16px;
        border: 1px solid #d1d5db;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 3px;
      }
      .btn-cancel:hover { background: #e5e7eb; }

      @media (max-width: 767px) {
        .header-clock { display: none !important; }
        .columns-container {
          flex-direction: column;
          overflow-y: auto;
        }
        .column {
          flex: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .column.collapsed .article-list { display: none; }
        .col-header { cursor: pointer; }
        .col-header .collapse-icon { display: inline-block; }
        .article-list { max-height: 400px; }
        #market-tiles { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
      }
      @media (min-width: 768px) {
        .col-header .collapse-icon { display: none; }
      }
    </style>
  </head>

    <script>

      rssInterval: 'rssInterval',
      marketInterval: 'mktInterval',
      feedCachePrefix: 'bloomberg.feed.cache:',
      feedStats: 'bloomberg.feed.stats',

    const CONFIG = {

    };

    const MARKET_SYMBOLS = [

    const BADGE_COLORS = {
      AP: '#dc2626',
      WAPO: '#1a1a1a',
      NYT: '#1a1a1a',
      WSJ: '#004b87',
      BBC: '#bb1919',

      MKTWTCH: '#00a651',

    function slugify(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {
        return;
      }
    }

    const FEED_STATS = loadJson(STORAGE_KEYS.feedStats, {});
    const feedCacheMemory = new Map();
    const columnState = {};

    const COLUMNS = [

        feeds: [
          { name: 'BMJ', url: 'https://www.bmj.com/rss/recent.xml', strategy: 'direct', alternates: ['https://bmjopen.bmj.com/rss/current.xml'], maxItems: 8 },
          { name: 'JWATCH GM', url: 'https://www.jwatch.org/general-medicine/rss', strategy: 'direct', maxItems: 8 },
          { name: 'EMRAP', url: 'https://www.youtube.com/feeds/videos.xml?channel_id=UCxwzhuYyeejWW1MIwIXi1Iw', strategy: 'direct', maxItems: 8 },
          { name: 'EMCRIT', url: 'https://feeds.feedburner.com/emcrit', strategy: 'direct', maxItems: 8 },
          { name: 'JAMA', url: 'https://jamanetwork.com/journals/jama/newonline/rss', strategy: 'direct', alternates: ['https://jamanetwork.com/journals/jama/pages/rss'], maxItems: 8 },
          { name: 'NEJM EM', url: 'https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=emergency-medicine', strategy: 'direct', maxItems: 8 },

          { name: 'JWATCH EM', url: 'https://www.jwatch.org/emergency-medicine/rss', strategy: 'direct', maxItems: 8 }
        ]
      }
    ];

    COLUMNS.forEach((column) => {
      column.feeds.forEach((feed) => {
        feed.key = `${column.id}:${slugify(feed.name)}`;
      });
    });

    COLUMNS.forEach((column) => {
      columnState[column.id] = {
        articlesByFeed: new Map(),
        mergedArticles: [],
        pendingFeeds: new Set(),
        failedFeeds: new Map(),
        renderToken: 0,
        renderScheduled: false,
        lastFetchAt: 0,
        lastSignature: '',
        hasCache: false,
        retryQueued: false,
        collapsed: false
      };
    });

    function getColumn(colId) {
      return COLUMNS.find((column) => column.id === colId);
    }

    function getColumnState(colId) {
      return columnState[colId];
    }

    function stripHTML(value) {
      if (!value) return '';
      const element = document.createElement('div');
      element.innerHTML = value;
      return element.textContent?.trim() || '';
    }

    function normalizeWhitespace(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function normalizeUrl(value) {
      if (!value) return '';
      try {
        const url = new URL(value, window.location.href);
        url.hash = '';
        ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'ref', 'cmpid'].forEach((param) => url.searchParams.delete(param));
        return url.toString();
      } catch {
        return String(value).trim();
      }
    }

    function parseDate(value) {
      if (!value) return null;
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      const text = String(value).trim();
      if (!text) return null;
      if (/^\d{10,13}$/.test(text)) {
        const numeric = Number(text);
        return text.length === 10 ? numeric * 1000 : numeric;
      }
      const parsed = Date.parse(text);
      return Number.isNaN(parsed) ? null : parsed;
    }

    function timeAgo(value) {
      const timestamp = typeof value === 'number' ? value : parseDate(value);
      if (!timestamp) return '';
      const diff = Date.now() - timestamp;
      if (diff < 0 || diff < 2 * 60 * 1000) return 'just now';
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return new Date(timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function isRecent(value) {
      const timestamp = typeof value === 'number' ? value : parseDate(value);
      return Boolean(timestamp && Date.now() - timestamp < 2 * 60 * 60 * 1000);
    }

    function nowTimestamp() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function makeArticleKey(article) {
      const title = normalizeWhitespace(article.title).toLowerCase();
      const link = normalizeUrl(article.link).toLowerCase();
      return title || link;
    }

    function getFeedCacheKey(feedKey) {
      return `${STORAGE_KEYS.feedCachePrefix}${feedKey}`;
    }

    function readFeedCache(feedKey) {
      const memory = feedCacheMemory.get(feedKey);
      if (memory) return memory;
      try {
        const raw = localStorage.getItem(getFeedCacheKey(feedKey));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        feedCacheMemory.set(feedKey, parsed);
        return parsed;
      } catch {
        return null;
      }
    }

    function writeFeedCache(feedKey, payload) {
      const cache = {
        updatedAt: Date.now(),
        items: payload.items || [],
        method: payload.method || '',
        sourceUrl: payload.sourceUrl || '',
        feedName: payload.feedName || ''
      };
      feedCacheMemory.set(feedKey, cache);
      try {
        localStorage.setItem(getFeedCacheKey(feedKey), JSON.stringify(cache));
      } catch {
        return;
      }
    }

    function readFeedStats(feedKey) {
      return FEED_STATS[feedKey] || {};
    }

    function updateFeedStats(feedKey, nextStats) {
      FEED_STATS[feedKey] = { ...readFeedStats(feedKey), ...nextStats };
      saveJson(STORAGE_KEYS.feedStats, FEED_STATS);
    }

    function feedSourceList(feed) {
      return [feed.url, ...(feed.alternates || [])].filter(Boolean);
    }

    function buildProxyUrls(url) {
      const busted = `${url}${url.includes('?') ? '&' : '?'}_cb=${Date.now()}`;
      return [
        `https://corsproxy.io/?url=${encodeURIComponent(busted)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(busted)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(busted)}`
      ];
    }

    async function fetchWithTimeout(url, init = {}, timeoutMs = CONFIG.feedTimeoutMs) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      if (init.signal) {
        if (init.signal.aborted) {
          controller.abort();
        } else {
          init.signal.addEventListener('abort', () => controller.abort(), { once: true });
        }
      }
      try {
        return await fetch(url, { ...init, cache: 'no-store', signal: controller.signal });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function normalizeArticle(raw, feed, index, method) {
      const title = normalizeWhitespace(stripHTML(raw.title));
      const link = normalizeUrl(raw.link || '');
      const description = normalizeWhitespace(stripHTML(raw.description));
      const pubDateMs = parseDate(raw.pubDate);
      return {
        key: makeArticleKey({ title, link }),
        title,
        link,
        description,
        source: feed.name,
        sourceKey: feed.key,
        sourceMethod: method,
        pubDateMs,
        fetchedAt: Date.now(),
        feedOrder: index
      };
    }

    function parseRssXml(xmlText, feed) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'text/xml');
      if (xml.querySelector('parsererror')) {
        throw new Error(`XML parse failed for ${feed.name}`);
      }

      const rssItems = [...xml.querySelectorAll('item')];
      if (rssItems.length) {
        return rssItems.map((item, index) => normalizeArticle({
          title: item.querySelector('title')?.textContent || '',
          link: item.querySelector('link')?.textContent || item.querySelector('guid')?.textContent || '',
          description: item.querySelector('description')?.textContent || item.querySelector('content\\:encoded')?.textContent || '',
          pubDate: item.querySelector('pubDate')?.textContent ||
            item.querySelector('published')?.textContent ||
            item.querySelector('updated')?.textContent ||
            item.querySelector('dc\\:date')?.textContent ||
            ''
        }, feed, index, 'direct'));
      }

      const atomEntries = [...xml.querySelectorAll('entry')];
      if (atomEntries.length) {
        return atomEntries.map((entry, index) => {
          const altLink = entry.querySelector('link[rel="alternate"]');
          const linkNode = entry.querySelector('link');
          return normalizeArticle({
            title: entry.querySelector('title')?.textContent || '',
            link: altLink?.getAttribute('href') || linkNode?.getAttribute('href') || linkNode?.textContent || entry.querySelector('id')?.textContent || '',
            description: entry.querySelector('summary')?.textContent ||
              entry.querySelector('content')?.textContent ||
              entry.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'description')?.[0]?.textContent ||
              '',
            pubDate: entry.querySelector('published')?.textContent ||
              entry.querySelector('updated')?.textContent ||
              ''
          }, feed, index, 'direct');
        });
      }

      throw new Error(`No feed items found for ${feed.name}`);
    }

    function parseRss2Json(json, feed) {
      if (!json || json.status !== 'ok' || !Array.isArray(json.items)) {
        throw new Error(`rss2json failed for ${feed.name}`);
      }
      return json.items.map((item, index) => normalizeArticle({
        title: item.title || '',
        link: item.link || item.guid || '',
        description: item.description || item.content || item.contentSnippet || '',
        pubDate: item.pubDate || item.published || item.isoDate || ''
      }, feed, index, 'rss2json'));
    }

    function dedupeArticles(articles) {
      const seen = new Map();
      for (const article of articles) {
        const key = article.key || makeArticleKey(article);
        const existing = seen.get(key);
        if (!existing) {
          seen.set(key, article);
          continue;
        }
        const existingScore = existing.pubDateMs || existing.fetchedAt || 0;
        const nextScore = article.pubDateMs || article.fetchedAt || 0;
        if (nextScore > existingScore) {
          seen.set(key, article);
        }
      }
      return [...seen.values()];
    }

    function sortArticles(articles) {
      return articles.sort((left, right) => {
        const leftScore = left.pubDateMs || left.fetchedAt || 0;
        const rightScore = right.pubDateMs || right.fetchedAt || 0;
        if (rightScore !== leftScore) return rightScore - leftScore;
        if (right.feedOrder !== left.feedOrder) return left.feedOrder - right.feedOrder;
        return left.source.localeCompare(right.source);
      });
    }

    function filterByAge(articles, ageLimitMs) {
      if (!ageLimitMs) return articles;
      return articles.filter((article) => {
        if (!article.pubDateMs) return true;
        return Date.now() - article.pubDateMs <= ageLimitMs;
      });
    }

    function trimArticles(articles, limit) {
      return articles.slice(0, limit || CONFIG.maxColumnItems);
    }

    function skeletonHTML() {
      let html = '';
      for (let index = 0; index < 4; index += 1) {
        html += '<div class="skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div>';
      }
      return html;
    }

    function createErrorNode(message, showRetry, onRetry) {
      const wrapper = document.createElement('div');
      wrapper.className = 'feed-error';
      const messageNode = document.createElement('span');
      messageNode.textContent = message;
      wrapper.appendChild(messageNode);
      if (showRetry && typeof onRetry === 'function') {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'retry-btn';
        button.textContent = 'RETRY';
        button.addEventListener('click', onRetry);
        wrapper.appendChild(button);
      }
      return wrapper;
    }

    function createArticleNode(article) {
      const link = document.createElement('a');
      link.className = 'article-card';
      link.href = article.link || '#';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';

      const top = document.createElement('div');
      top.className = 'article-top';

      const source = document.createElement('span');
      source.className = 'source-badge';
      source.style.background = BADGE_COLORS[article.source] || '#6b7280';
      source.textContent = article.source;

      const time = document.createElement('span');
      time.className = 'time-ago';
      if (isRecent(article.pubDateMs)) {
        const dot = document.createElement('span');
        dot.className = 'recent-dot';
        time.appendChild(dot);
      }
      time.appendChild(document.createTextNode(timeAgo(article.pubDateMs)));

      top.appendChild(source);
      top.appendChild(time);

      const title = document.createElement('div');
      title.className = 'article-title';
      title.textContent = article.title || '';

      link.appendChild(top);
      link.appendChild(title);

      if (article.description) {
        const description = document.createElement('div');
        description.className = 'article-desc';
        description.textContent = article.description;
        link.appendChild(description);
      }

      return link;
    }

    function updateColumnHealth(colId) {
      const state = getColumnState(colId);
      const healthEl = document.getElementById(`col-health-${colId}`);
      if (!healthEl) return;
      const total = getColumn(colId)?.feeds.length || 0;
      const done = total - state.pendingFeeds.size;
      const failed = state.failedFeeds.size;
      let label = `${done}/${total}`;
      let className = 'ok';
      if (state.pendingFeeds.size > 0) {
        label += ' LIVE';
        className = failed ? 'warn' : 'ok';
      }
      if (failed > 0) {
        label = `${label} FAIL ${[...state.failedFeeds.values()].map((feed) => feed.name).join(', ')}`;
        className = 'error';
      }
      healthEl.textContent = label;
      healthEl.className = `feed-health ${className}`;
      healthEl.title = failed > 0 ? [...state.failedFeeds.values()].map((feed) => feed.name).join(', ') : 'Feed health OK';
    }

    function updateColumnTimestamp(colId, timestamp) {
      const el = document.getElementById(`col-time-${colId}`);
      if (!el) return;
      el.textContent = timestamp ? new Date(timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : nowTimestamp();
    }

    function renderArticleList(colId, articles, emptyMessage) {
      const state = getColumnState(colId);
      const listEl = document.getElementById(`articles-${colId}`);
      if (!listEl) return;
      state.renderToken += 1;
      const token = state.renderToken;
      const previousScrollTop = listEl.scrollTop;
      listEl.replaceChildren();

      if (!articles.length) {
        listEl.appendChild(createErrorNode(emptyMessage || 'No articles found', false));
        return;
      }

      let index = 0;
      const renderBatch = () => {
        if (token !== state.renderToken) return;
        const fragment = document.createDocumentFragment();
        const end = Math.min(index + CONFIG.articleBatchSize, articles.length);
        for (; index < end; index += 1) {
          fragment.appendChild(createArticleNode(articles[index]));
        }
        listEl.appendChild(fragment);
        if (index < articles.length) {
          requestAnimationFrame(renderBatch);
        } else if (previousScrollTop > 0) {
          requestAnimationFrame(() => {
            listEl.scrollTop = previousScrollTop;
          });
        }
      };

      renderBatch();
    }

    function renderColumn(colId) {
      const column = getColumn(colId);
      const state = getColumnState(colId);
      if (!column) return;

      const articles = [];
      state.articlesByFeed.forEach((items) => {
        articles.push(...items);
      });

      let merged = dedupeArticles(articles);
      merged = sortArticles(merged);
      merged = filterByAge(merged, column.ageLimitMs);
      merged = trimArticles(merged, CONFIG.maxColumnItems);
      state.mergedArticles = merged;

      const signature = merged.slice(0, 60).map((article) => article.key).join('|');
      if (signature === state.lastSignature && document.getElementById(`articles-${colId}`)?.childElementCount > 0) {
        updateColumnHealth(colId);
        updateColumnTimestamp(colId, state.lastFetchAt);
        return;
      }
      state.lastSignature = signature;

      if (!merged.length) {
        if (state.pendingFeeds.size > 0 && !state.hasCache) return;
        const failedNames = [...state.failedFeeds.values()].map((feed) => feed.name);
        const emptyMessage = failedNames.length ? `No live items. Failed feeds: ${failedNames.join(', ')}` : 'No articles found';
        renderArticleList(colId, [], emptyMessage);
        updateColumnHealth(colId);
        updateColumnTimestamp(colId, state.lastFetchAt);
        return;
      }

      renderArticleList(colId, merged, '');
      updateColumnHealth(colId);
      updateColumnTimestamp(colId, state.lastFetchAt);
    }

    function scheduleColumnRender(colId) {
      const state = getColumnState(colId);
      if (state.renderScheduled) return;
      state.renderScheduled = true;
      requestAnimationFrame(() => {
        state.renderScheduled = false;
        renderColumn(colId);
      });
    }

    function parseFeedItemsFromText(text, feed) {
      return parseRssXml(text, feed);
    }

    async function fetchDirectFeed(feed, sourceUrl) {
      const response = await fetchWithTimeout(`${sourceUrl}${sourceUrl.includes('?') ? '&' : '?'}_cb=${Date.now()}`, { mode: 'cors' });
      if (!response.ok) throw new Error(`direct fetch failed for ${feed.name}`);
      const text = await response.text();
      const items = parseFeedItemsFromText(text, feed);
      if (!items.length) throw new Error(`empty feed for ${feed.name}`);
      return items;
    }

    async function fetchRss2JsonFeed(feed, sourceUrl) {
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(sourceUrl)}&count=${feed.maxItems || 20}`;
      const response = await fetchWithTimeout(apiUrl, { mode: 'cors' });
      if (!response.ok) throw new Error(`rss2json response failed for ${feed.name}`);
      const json = await response.json();
      const items = parseRss2Json(json, feed);
      if (!items.length) throw new Error(`empty rss2json feed for ${feed.name}`);
      return items;
    }

    async function fetchProxyFeed(feed, sourceUrl) {
      const proxies = buildProxyUrls(sourceUrl);
      let lastError = null;
      for (const proxyUrl of proxies) {
        try {
          const response = await fetchWithTimeout(proxyUrl, { mode: 'cors' });
          if (!response.ok) continue;
          const text = await response.text();
          let xmlText = text;
          try {
            const parsed = JSON.parse(text);
            if (parsed.contents) xmlText = parsed.contents;
          } catch {
            xmlText = text;
          }
          const items = parseFeedItemsFromText(xmlText, feed);
          if (items.length) return items;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error(`proxy failed for ${feed.name}`);
    }

    function createRaceAttempt(factory) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), CONFIG.feedTimeoutMs);
      const promise = Promise.resolve().then(() => factory(controller.signal)).finally(() => clearTimeout(timeoutId));
      return {
        promise,
        abort() {
          try {
            controller.abort();
          } catch {
            return;
          }
        }
      };
    }

    async function raceDirectAndJson(feed, sourceUrl) {
      return new Promise((resolve, reject) => {
        let settled = false;
        let directAttempt = null;
        let jsonAttempt = null;
        let directError = null;
        let jsonError = null;

        const finishSuccess = (method, items) => {
          if (settled) return;
          settled = true;
          if (directAttempt) directAttempt.abort();
          if (jsonAttempt) jsonAttempt.abort();
          resolve({ items, method, sourceUrl });
        };

        const finishError = (method, error) => {
          if (settled) return;
          if (method === 'direct') directError = error;
          else jsonError = error;
          if (directError && jsonError) {
            settled = true;
            reject(directError);
          }
        };

        directAttempt = createRaceAttempt((signal) => fetchWithTimeout(`${sourceUrl}${sourceUrl.includes('?') ? '&' : '?'}_cb=${Date.now()}`, { mode: 'cors', signal }).then(async (response) => {
          if (!response.ok) throw new Error(`direct fetch failed for ${feed.name}`);
          const text = await response.text();
          const items = parseFeedItemsFromText(text, feed);
          if (!items.length) throw new Error(`empty feed for ${feed.name}`);
          return items;
        }));
        directAttempt.promise.then((items) => finishSuccess('direct', items)).catch((error) => finishError('direct', error));

        window.setTimeout(() => {
          if (settled) return;
          jsonAttempt = createRaceAttempt((signal) => fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(sourceUrl)}&count=${feed.maxItems || 20}`, { mode: 'cors', signal }).then(async (response) => {
            if (!response.ok) throw new Error(`rss2json response failed for ${feed.name}`);
            const json = await response.json();
            const items = parseRss2Json(json, feed);
            if (!items.length) throw new Error(`empty rss2json feed for ${feed.name}`);
            return items;
          }));
          jsonAttempt.promise.then((items) => finishSuccess('rss2json', items)).catch((error) => finishError('rss2json', error));
        }, CONFIG.rss2jsonDelayMs);
      });
    }

    async function fetchFeedSmart(feed) {
      const stats = readFeedStats(feed.key);
      const sources = feedSourceList(feed);
      let lastError = null;

      const preferredMethod =
        stats.preferredMethod ||
        (feed.strategy === 'rss2json' ? 'rss2json' : feed.strategy === 'direct' ? 'direct' : 'race');

      const methodOrder = preferredMethod === 'rss2json'
        ? ['rss2json', 'direct', 'proxy']
        : preferredMethod === 'direct'
          ? ['direct', 'rss2json', 'proxy']
          : ['race', 'direct', 'rss2json', 'proxy'];

      for (const sourceUrl of sources) {
        for (const method of methodOrder) {
          const startedAt = performance.now();
          try {
            let result;
            if (method === 'race') {
              result = await raceDirectAndJson(feed, sourceUrl);
            } else if (method === 'rss2json') {
              result = { items: await fetchRss2JsonFeed(feed, sourceUrl), method: 'rss2json', sourceUrl };
            } else if (method === 'direct') {
              result = { items: await fetchDirectFeed(feed, sourceUrl), method: 'direct', sourceUrl };
            } else {
              result = { items: await fetchProxyFeed(feed, sourceUrl), method: 'proxy', sourceUrl };
            }

            const elapsed = Math.round(performance.now() - startedAt);
            if (result.method !== 'proxy') {
              updateFeedStats(feed.key, {
                preferredMethod: result.method,
                preferredSource: result.sourceUrl,
                lastSuccessAt: Date.now(),
                lastDurationMs: elapsed
              });
            }
            return { ...result, elapsed };
          } catch (error) {
            lastError = error;
          }
        }
      }

      throw lastError || new Error(`Unable to load ${feed.name}`);
    }

    async function refreshFeedIntoColumn(column, feed, { retry = false } = {}) {
      const state = getColumnState(column.id);
      state.pendingFeeds.add(feed.key);
      state.failedFeeds.delete(feed.key);
      updateColumnHealth(column.id);

      try {
        const result = await fetchFeedSmart(feed);
        state.articlesByFeed.set(feed.key, result.items.slice(0, feed.maxItems || 12));
        state.lastFetchAt = Date.now();
        state.hasCache = true;
        writeFeedCache(feed.key, {
          items: result.items.slice(0, feed.maxItems || 12),
          method: result.method,
          sourceUrl: result.sourceUrl,
          feedName: feed.name
        });
        scheduleColumnRender(column.id);
      } catch (error) {
        const cached = readFeedCache(feed.key);
        if (cached?.items?.length && !state.articlesByFeed.has(feed.key)) {
          state.articlesByFeed.set(feed.key, cached.items);
        }
        state.failedFeeds.set(feed.key, feed);
        console.warn(`Feed failed: ${feed.name}`, error);
        scheduleColumnRender(column.id);
      } finally {
        state.pendingFeeds.delete(feed.key);
        updateColumnHealth(column.id);
      }

      if (!retry && state.failedFeeds.size && !state.retryQueued) {
        state.retryQueued = true;
        window.setTimeout(() => {
          state.retryQueued = false;
          const stillFailed = [...state.failedFeeds.values()];
          stillFailed.forEach((failedFeed) => {
            refreshFeedIntoColumn(column, failedFeed, { retry: true });
          });
        }, CONFIG.rss2jsonDelayMs + 1200);
      }
    }

    function hydrateColumnFromCache(column) {
      const state = getColumnState(column.id);
      state.articlesByFeed.clear();
      let cachedCount = 0;
      for (const feed of column.feeds) {
        const cache = readFeedCache(feed.key);
        if (cache?.items?.length) {
          state.articlesByFeed.set(feed.key, cache.items);
          cachedCount += 1;
          state.lastFetchAt = Math.max(state.lastFetchAt, cache.updatedAt || 0);
        }
      }
      state.hasCache = cachedCount > 0;
      if (cachedCount) {
        scheduleColumnRender(column.id);
      }
    }

    async function refreshColumn(columnId, options = {}) {
      const column = getColumn(columnId);
      if (!column) return;
      const state = getColumnState(columnId);
      state.pendingFeeds = new Set(column.feeds.map((feed) => feed.key));
      state.failedFeeds.clear();
      state.lastSignature = '';
      updateColumnHealth(columnId);

      const tasks = column.feeds.map((feed) => refreshFeedIntoColumn(column, feed, options));
      await Promise.allSettled(tasks);
      state.pendingFeeds.clear();
      updateColumnHealth(columnId);
      scheduleColumnRender(columnId);
    }

    function marketCacheRead() {
      return loadJson(STORAGE_KEYS.marketCache, null);
    }

    function marketCacheWrite(payload) {
      saveJson(STORAGE_KEYS.marketCache, payload);
    }

    function renderMarketTimestamp(timestamp) {
      const el = document.getElementById('market-updated');
      if (!el) return;
      el.textContent = `Updated ${new Date(timestamp || Date.now()).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
    }

    function renderMarketTiles(results) {
      const container = document.getElementById('market-tiles');
      if (!container) return;
      const fragment = document.createDocumentFragment();
      results.forEach((result) => {
        const gain = result.change == null ? true : result.change >= 0;
        const color = gain ? '#16a34a' : '#dc2626';
        const arrow = gain ? '▲' : '▼';
        const priceText = result.price != null ? result.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
        const changeText = result.change != null ? `${gain ? '+' : ''}${result.change.toFixed(2)}` : '—';
        const pctText = result.pct != null ? `${gain ? '+' : ''}${result.pct.toFixed(2)}%` : '—';

        const tile = document.createElement('a');
        tile.href = result.url;
        tile.target = '_blank';
        tile.rel = 'noopener noreferrer';
        tile.className = 'market-tile';
        tile.innerHTML = `
          <div class="tile-link-icon">↗</div>
          <div class="tile-name">${result.name}</div>
          <div class="tile-price">${priceText}</div>
          <div class="tile-change" style="color:${color}">${arrow} ${changeText} (${pctText})</div>
        `;
        fragment.appendChild(tile);
      });
      container.replaceChildren(fragment);
    }

    function renderMarketFallback(message) {
      const container = document.getElementById('market-tiles');
      if (!container || container.childElementCount) return;
      container.innerHTML = `<div style="font-size:11px;color:#6b7280;padding:8px;">${message || 'Market data unavailable - retrying...'}</div>`;
    }

    async function fetchOneMarket(symbol) {
      const apiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol.sym)}?interval=1d&range=1d`;
      const proxies = [
        `https://corsproxy.io/?url=${encodeURIComponent(apiUrl)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`
      ];
      for (const url of proxies) {
        try {
          const response = await fetchWithTimeout(url, { mode: 'cors' });
          if (!response.ok) continue;
          const text = await response.text();
          let json;
          try {
            const parsed = JSON.parse(text);
            json = parsed.contents ? JSON.parse(parsed.contents) : parsed;
          } catch {
            continue;
          }
          const meta = json?.chart?.result?.[0]?.meta;
          if (!meta) continue;
          const price = meta.regularMarketPrice;
          const previousClose = meta.chartPreviousClose || meta.previousClose || meta.regularMarketPreviousClose;
          const change = (price != null && previousClose != null) ? price - previousClose : null;
          const pct = (change != null && previousClose) ? (change / previousClose) * 100 : null;
          return { sym: symbol.sym, name: symbol.name, url: symbol.url, price, change, pct };
        } catch {
          continue;
        }
      }
      return { sym: symbol.sym, name: symbol.name, url: symbol.url, price: null, change: null, pct: null };
    }

    async function refreshMarketData({ background = false } = {}) {
      const cached = marketCacheRead();
      const container = document.getElementById('market-tiles');
      if (!container) return;

      if (!navigator.onLine && cached?.results?.length) {
        renderMarketTiles(cached.results);
        renderMarketTimestamp(cached.updatedAt);
        return;
      }
      if (!navigator.onLine && !cached?.results?.length) {
        renderMarketFallback('Market data unavailable - offline.');
        return;
      }

      const results = await Promise.all(MARKET_SYMBOLS.map(fetchOneMarket));
      const hasData = results.some((result) => result.price != null);
      if (hasData) {
        marketCacheWrite({ updatedAt: Date.now(), results });
        renderMarketTiles(results);
        renderMarketTimestamp(Date.now());
        scheduleLayout();
      } else if (cached?.results?.length) {
        renderMarketTiles(cached.results);
        renderMarketTimestamp(cached.updatedAt);
      } else {
        renderMarketFallback();
      }
    }

    function renderColumns() {
      const container = document.getElementById('columns-container-c4d5');
      if (!container) return;
      container.innerHTML = '';

      COLUMNS.forEach((column) => {
        const columnNode = document.createElement('div');
        columnNode.className = 'column';
        columnNode.id = `column-${column.id}`;
        const filterPill = column.id === 'news' || column.id === 'markets' ? '<span class="filter-pill">36h</span>' : '';
        columnNode.innerHTML = `
          <div class="col-header" data-collapse="${column.id}">
            <div class="flex items-center gap-2">
              <span class="col-title">${column.label}</span>
              <span class="collapse-icon font-mono-data" style="font-size:9px;color:#9ca3af;">▼</span>
            </div>
            <div class="col-meta" data-refresh-col="${column.id}">
              <span>↺</span>
              <span id="col-time-${column.id}" style="font-variant-numeric:tabular-nums;">${nowTimestamp()}</span>
              <span id="col-health-${column.id}" class="feed-health ok">0/${column.feeds.length}</span>
              ${filterPill}
            </div>
          </div>
          <div class="article-list" id="articles-${column.id}">${skeletonHTML()}</div>
        `;
        container.appendChild(columnNode);
      });

      document.querySelectorAll('[data-collapse]').forEach((element) => {
        element.addEventListener('click', (event) => {
          if (window.innerWidth >= 768) return;
          if (event.target.closest('[data-refresh-col]')) return;
          const colId = element.dataset.collapse;
          const colNode = document.getElementById(`column-${colId}`);
          if (!colNode) return;
          colNode.classList.toggle('collapsed');
          const icon = element.querySelector('.collapse-icon');
          if (icon) icon.textContent = colNode.classList.contains('collapsed') ? '▶' : '▼';
        });
      });

      document.querySelectorAll('[data-refresh-col]').forEach((element) => {
        element.addEventListener('click', (event) => {
          event.stopPropagation();
          refreshColumn(element.dataset.refreshCol, { force: true });
        });
      });
    }

    function hydrateAllColumnsFromCache() {
      COLUMNS.forEach((column) => hydrateColumnFromCache(column));
    }

    function calculateLayout() {
      const headerEl = document.getElementById('header-bar-a1b2');
      const marketEl = document.getElementById('market-section-w2x3');
      const quickLinksEl = document.getElementById('quick-links-bar-q1r2');
      const columnsEl = document.getElementById('columns-container-c4d5');
      const headerHeight = headerEl?.offsetHeight || 40;
      const marketHeight = marketEl?.offsetHeight || 74;
      const quickLinksHeight = quickLinksEl?.offsetHeight || 34;
      if (quickLinksEl) quickLinksEl.style.top = `${headerHeight + marketHeight}px`;
      if (columnsEl) columnsEl.style.top = `${headerHeight + marketHeight + quickLinksHeight}px`;
    }

    let layoutFrame = 0;
    function scheduleLayout() {
      if (layoutFrame) return;
      layoutFrame = requestAnimationFrame(() => {
        layoutFrame = 0;
        calculateLayout();
      });
    }

    function startClock() {
      const updateClock = () => {
        const now = new Date();
        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const el = document.getElementById('header-clock-c3d4');
        if (!el) return;
        el.textContent = `${days[now.getDay()]} ${String(now.getDate()).padStart(2, '0')} ${months[now.getMonth()]} ${now.getFullYear()}  ${now.toLocaleTimeString('en-US', { hour12: false })} CDT`;
      };
      updateClock();
      window.setInterval(updateClock, 1000);
    }

    function openSettings() {
      document.getElementById('select-rss-i6j7').value = localStorage.getItem(STORAGE_KEYS.rssInterval) || '15';
      document.getElementById('select-mkt-q4r5').value = localStorage.getItem(STORAGE_KEYS.marketInterval) || '2';
      document.getElementById('settings-modal-g8h9').classList.add('show');
    }

    function closeSettings() {
      document.getElementById('settings-modal-g8h9').classList.remove('show');
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEYS.rssInterval, document.getElementById('select-rss-i6j7').value);
      localStorage.setItem(STORAGE_KEYS.marketInterval, document.getElementById('select-mkt-q4r5').value);
      closeSettings();
      restartTimers();
    }

    async function refreshAll({ force = true } = {}) {
      await Promise.all([
        refreshMarketData({ background: true }),
        ...COLUMNS.map((column) => refreshColumn(column.id, { force }))
      ]);
    }

    let rssTimer = 0;
    let marketTimer = 0;

    function clearTimers() {
      if (rssTimer) clearTimeout(rssTimer);
      if (marketTimer) clearTimeout(marketTimer);
      rssTimer = 0;
      marketTimer = 0;
    }

    function scheduleRssRefresh() {
      if (rssTimer) clearTimeout(rssTimer);
      const intervalMs = (parseInt(localStorage.getItem(STORAGE_KEYS.rssInterval), 10) || 15) * 60 * 1000;
      rssTimer = window.setTimeout(async () => {
        await Promise.all(COLUMNS.map((column) => refreshColumn(column.id, { force: true })));
        scheduleRssRefresh();
      }, intervalMs);
    }

    function scheduleMarketRefresh() {
      if (marketTimer) clearTimeout(marketTimer);
      const intervalMs = (parseInt(localStorage.getItem(STORAGE_KEYS.marketInterval), 10) || 2) * 60 * 1000;
      marketTimer = window.setTimeout(async () => {
        await refreshMarketData({ background: true });
        scheduleMarketRefresh();
      }, intervalMs);
    }

    function restartTimers() {
      clearTimers();
      scheduleRssRefresh();
      scheduleMarketRefresh();
    }

    function wireLayoutObservers() {
      const targets = ['market-section-w2x3', 'quick-links-bar-q1r2'];
      if (typeof ResizeObserver === 'function') {
        const observer = new ResizeObserver(() => scheduleLayout());
        targets.forEach((id) => {
          const element = document.getElementById(id);
          if (element) observer.observe(element);
        });
      }
      window.addEventListener('resize', scheduleLayout);
      window.addEventListener('online', () => refreshAll({ force: true }));
    }

    async function init() {
      if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
        lucide.createIcons();
      }

      document.getElementById('settings-btn-e5f6').addEventListener('click', openSettings);
      document.getElementById('refresh-btn-g7h8').addEventListener('click', () => refreshAll({ force: true }));
      document.getElementById('save-settings-y2z3').addEventListener('click', saveSettings);
      document.getElementById('cancel-settings-c6d7').addEventListener('click', closeSettings);
      document.getElementById('settings-modal-g8h9').addEventListener('click', (event) => {
        if (event.target === event.currentTarget) closeSettings();
      });

      startClock();
      renderColumns();
      hydrateAllColumnsFromCache();
      wireLayoutObservers();
      scheduleLayout();

      await Promise.all([
        refreshMarketData({ background: true }),
        ...COLUMNS.map((column) => refreshColumn(column.id, { force: true }))
      ]);

      restartTimers();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    </script>
  </body>
</html>
